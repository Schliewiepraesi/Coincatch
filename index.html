<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <title>Coincatch</title>
    <style>
        body {
        display: flex;
        flex-flow: row wrap;
         overflow: hidden;
            background: #555555;
        }
        div {
            flex: 1;
            border: 0.5dvh solid #AAAAAA;
            border-radius: 1dvh;
            height: 5dvh;
            align-items: center;
            color: #AAAAAA;
        }
        .div {
        flex: 1;
        height: 5dvh;
        align-items: center;
        font-size: 5dvh;
        }
        .row {
        flex: 100%;
        align-content: center;
        text-align: center;
        }
        canvas {
        background-color: #222;
        display: block;
        margin: 50px auto;
        border: 16px solid #AAAAAA;
        width:100%;
        height: 80dvh;

        }
    </style>
</head>
<body>

<div>Bestzeit in Hektoframes: <span id="Z2">0</span></div>
<div>Runde: <span id="Round">1</span></div>
<div><img src="https://raw.githubusercontent.com/Schliewiepraesi/Coincatch/refs/heads/main/Haufen_2.png"
          class="div"><span id="Cash" class="div">0</span></div>
<div class="row">Playerspeed:<span id="Playerspeed">1</span> &nbsp; &nbsp; &nbsp; &nbsp; Coinspeed:<span id="Coinspeed">1</span>

</html>
